<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Delphi — Brand</title>
    <style>
      :root {
        --bg: rgb(243,242,239);
        --bg-r: 243;
        --bg-g: 242;
        --bg-b: 239;
        --fg: rgb(0,0,0);
        --fg-r: 0;
        --fg-g: 0;
        --fg-b: 0;
        /* UI palette – small swatches reference */
        --color-page-bg: #F5F5F5;
        --color-primary-card-bg: #FFFFFF;
        --color-primary-dark-bg: #343434;
        --color-secondary-dark-bg: #3D3D3D;
        --color-disabled-accent: #AFAFAD;
        --color-active-green-bg: #E4FFE9;
        --color-error-red-bg: #F0D7D7;
        --color-disabled-fill: #E1E1E1;
        --color-light-fill: #FBFBFB;
        --color-input-field-on-light: #797777;
        --color-upcoming-blue: #D0DCF2;
        --color-upcoming-blue-muted: #F3F7FD;
        --color-dark-active-green: #00632D;
        --color-muted-red: #FDF3F1;
        --color-upcoming-on-dark: #727575;
        --color-card-stroke: #CCCCCC;
        --color-divider-stroke: #999999;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--bg);
        background-image: radial-gradient(circle, rgba(var(--fg-r), var(--fg-g), var(--fg-b), 0.10) 1px, transparent 1px);
        background-size: 28px 28px;
        transition: background-color 0.6s ease;
        font-family: 'Instrument Serif', serif;
        color: var(--fg);
      }
      @font-face {
        font-family: 'Instrument Serif';
        src: url('/Instrument_Serif/InstrumentSerif-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Fragment Mono';
        src: url('/Fragment_Mono/FragmentMono-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
      }

      /* ========== Layout ========== */

      #content {
        width: 100%;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }
      #content canvas {
        display: block;
      }

      .app-logo-btn {
        position: fixed;
        top: 24px;
        left: 24px;
        width: 36px;
        height: 36px;
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--fg);
        opacity: 0.7;
        cursor: pointer;
        z-index: 60;
      }
      .app-logo-btn svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .app-logo-btn:hover {
        opacity: 1;
      }

      .theme-toggle {
        position: fixed;
        left: 24px;
        bottom: 24px;
        width: 32px;
        height: 32px;
        border: 1.5px solid rgba(var(--fg-r), var(--fg-g), var(--fg-b), 0.35);
        border-radius: 50%;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.6;
        transition: opacity 0.2s ease, border-color 0.3s ease;
        color: var(--fg);
        z-index: 60;
      }
      .theme-toggle:hover {
        opacity: 1;
      }
      .theme-toggle svg {
        width: 16px;
        height: 16px;
      }
      .theme-toggle .icon-sun { display: none; }
      .theme-toggle .icon-moon { display: block; }
      [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
      [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

      [data-theme="dark"] .logo-wrap-blk {
        background: rgb(243, 242, 239) !important;
      }

      /* ========== App page – phone frame + scroll ========== */

      .app-page {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .app-phone-frame {
        position: relative;
        width: min(320px, 85vw);
        height: min(660px, 88vh);
        max-height: min(660px, 88vh);
        border: 1px solid rgba(var(--fg-r), var(--fg-g), var(--fg-b), 0.12);
        border-radius: 44px;
        overflow: hidden;
        background: transparent;
      }
      .app-phone-screen {
        width: 100%;
        height: 100%;
        border-radius: 0;
        overflow: hidden;
        background: var(--bg);
      }
      .app-phone-scroll {
        width: 100%;
        height: 100%;
        overflow: auto;
        overflow-x: hidden;
        cursor: grab;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .app-phone-scroll::-webkit-scrollbar {
        display: none;
      }
      .app-phone-scroll:active {
        cursor: grabbing;
      }
      .app-phone-image {
        display: block;
        width: 100%;
        height: auto;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      /* ========== Data Visualiser overlays ========== */

      .ui-hidden {
        opacity: 0 !important;
        pointer-events: none !important;
      }

      .tagline {
        position: absolute;
        bottom: 26px;
        left: 28px;
        font-family: 'Instrument Serif', serif;
        font-size: 14pt;
        color: var(--fg);
        opacity: 0.55;
        letter-spacing: 0.02em;
        pointer-events: none;
        z-index: 10;
        line-height: 1.4;
        transition: opacity 0.5s ease, color 0.6s ease;
      }
      .tagline-line {
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        display: block;
      }
      .tagline-line1 {
        border-right: 1.5px solid rgba(var(--fg-r),var(--fg-g),var(--fg-b),0.4);
        animation: type-line1 2s steps(26, end) 0.8s forwards,
                   blink-caret 0.6s step-end 0.8s 4,
                   hide-caret 0.01s linear 3.2s forwards;
      }
      .tagline-line2 {
        border-right: 1.5px solid rgba(var(--fg-r),var(--fg-g),var(--fg-b),0.4);
        animation: type-line2 2s steps(28, end) 3.2s forwards,
                   blink-caret 0.6s step-end 3.2s 4,
                   hide-caret 0.01s linear 5.6s forwards;
      }
      @keyframes type-line1 {
        from { width: 0; }
        to   { width: 11em; }
      }
      @keyframes type-line2 {
        from { width: 0; }
        to   { width: 12.2em; }
      }
      @keyframes blink-caret {
        50% { border-color: transparent; }
      }
      @keyframes hide-caret {
        to { border-color: transparent; }
      }
      .stats {
        position: absolute;
        bottom: 100px;
        left: 28px;
        font-family: 'Instrument Serif', serif;
        font-size: 11pt;
        color: var(--fg);
        opacity: 0.55;
        letter-spacing: 0.02em;
        pointer-events: none;
        z-index: 10;
        width: 280px;
        transition: opacity 0.5s ease, color 0.6s ease;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 7px 0;
        opacity: 0;
        white-space: nowrap;
      }
      .stat-row + .stat-row {
        border-top: 1px dotted rgba(var(--fg-r), var(--fg-g), var(--fg-b), 0.3);
        transition: border-color 0.6s ease;
      }
      .stat-row:nth-child(1) {
        animation: reveal-stat 0.6s steps(16, end) 6.0s forwards;
      }
      .stat-row:nth-child(2) {
        animation: reveal-stat 0.6s steps(16, end) 6.6s forwards;
      }
      .stat-row:nth-child(3) {
        animation: reveal-stat 0.6s steps(16, end) 7.2s forwards;
      }
      @keyframes reveal-stat {
        0%   { opacity: 0; clip-path: inset(0 100% 0 0); }
        1%   { opacity: 1; clip-path: inset(0 100% 0 0); }
        99%  { opacity: 1; clip-path: inset(0 0 0 0); }
        100% { opacity: 1; clip-path: none; }
      }
      .stat-label {
        opacity: 0.7;
      }
      .stat-value {
        font-variant-numeric: tabular-nums;
      }
      .chart-title {
        position: absolute;
        bottom: 28px;
        right: 30px;
        font-family: 'Instrument Serif', serif;
        font-size: 14pt;
        color: var(--fg);
        opacity: 0.55;
        letter-spacing: 0.02em;
        pointer-events: none;
        z-index: 10;
        text-align: right;
        transition: opacity 0.5s ease, color 0.6s ease;
      }
      .video-player {
        position: absolute;
        bottom: 240px;
        left: 28px;
        width: 200px;
        height: 200px;
        border-radius: 12px;
        overflow: hidden;
        z-index: 20;
        cursor: grab;
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      .video-player.visible {
        opacity: 1;
      }
      .video-player.ended {
        opacity: 0.55;
        cursor: pointer;
      }
      .video-player:active {
        cursor: grabbing;
      }
      .video-player video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        display: block;
      }

      /* ========== Placeholder pages ========== */

      .page-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        flex-direction: column;
        gap: 12px;
        opacity: 0.35;
      }
      .page-placeholder h1 {
        font-family: 'Instrument Serif', serif;
        font-size: 28pt;
        font-weight: 400;
        letter-spacing: 0.02em;
      }
      .page-placeholder p {
        font-family: 'Instrument Serif', serif;
        font-size: 12pt;
        letter-spacing: 0.02em;
      }

      /* ========== Mobile (<=768px) ========== */

      @media (max-width: 768px) {
        #content {
          width: 100%;
          height: 100vh;
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
        }
      }

      /* ========== Touch-friendly button feedback ========== */

      @media (hover: none) {
        button:active {
          opacity: 0.7;
        }
      }
    </style>
  </head>
  <body>
    <button id="app-logo-btn" class="app-logo-btn" aria-label="Go to assets">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="3">
        <path d="M128.35,14.96h-56.69c-31.31,0-56.69,25.38-56.69,56.69v56.69c0,31.31,25.38,56.69,56.69,56.69h56.69c31.31,0,56.69-25.38,56.69-56.69v-56.69c0-31.31-25.38-56.69-56.69-56.69Z"/>
        <rect x="33.07" y="98.59" width="62.37" height="64.43" rx="27.63" ry="27.63"/>
        <rect x="104.62" y="37.71" width="62.37" height="125" rx="28.35" ry="28.35"/>
      </svg>
    </button>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <main id="content"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
